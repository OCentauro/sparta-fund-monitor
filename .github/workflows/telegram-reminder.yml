name: Telegram Reminder - Update Fundamentals

on:
  schedule:
    - cron: '0 12 11 * *'
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Message
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="📅 *Lembrete Mensal: Atualização de Fundamentos*
          
          Olá! Hoje é dia 11. É hora de atualizar os indicadores (P/VP, P/FFO, DY) no Sparta Fund Monitor.
          
          🔗 *Clique abaixo para editar o arquivo diretamente no GitHub:*
          https://github.com/OCentauro/sparta-fund-monitor/edit/main/fundamentals.json
          
          *Fontes para consulta:*
          - StatusInvest
          - Investidor10" \
            -d parse_mode="Markdown"