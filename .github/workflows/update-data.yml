name: Update Fundamentals Data

on:
  schedule:
    # Roda todo dia 11 do mês às 9h UTC (6h da manhã no Brasil)
    - cron: '0 9 11 * *'
  workflow_dispatch: # Permite rodar manualmente pelo GitHub

permissions:
  contents: write # Necessário para o bot fazer commit

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4
          playwright install chromium

      - name: Run extraction script
        run: python extract_fundamentals.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fundamentals.json
          git diff --staged --quiet || git commit -m "chore: auto-update fundamentals $(date +%Y-%m)"
          git push