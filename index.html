<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <title>Sparta Fund Monitor</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="SpartaFII">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
  <style>
    /* [SEÇÃO 1] Variáveis CSS */
    :root {
      --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --muted: #64748b;
      --accent: #2563eb; --border: #e2e8f0; --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1120; --card: #111827; --text: #e5e7eb; --muted: #9ca3af;
        --border: #1f2937; --shadow: 0 4px 12px rgb(0 0 0 / 0.4);
      }
    }
    
    /* [SEÇÃO 2] Estilos Base */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; padding: 20px; }
    header { max-width: 1200px; margin: 0 auto 30px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 12px; }
    h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.5px; }
    .meta { color: var(--muted); font-size: 0.875rem; }
    
    /* [SEÇÃO 3] Botões */
    button { background: var(--accent); color: #fff; border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 0.875rem; font-weight: 500; transition: opacity 0.2s; }
    button:hover { opacity: 0.9; } button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: var(--border); color: var(--text); }
    button.danger { background: var(--danger); }
    
    /* [SEÇÃO 4] Grid e Cards */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; max-width: 1200px; margin: 0 auto; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; box-shadow: var(--shadow); transition: transform 0.2s; }
    .card:hover { transform: translateY(-2px); }
    .ticker { font-weight: 700; font-size: 1.125rem; margin-bottom: 4px; }
    .name { color: var(--muted); font-size: 0.8rem; margin-bottom: 12px; }
    
    /* [SEÇÃO 5] Métricas */
    .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .metric { background: var(--bg); padding: 8px; border-radius: 8px; text-align: center; }
    .metric .label { display: block; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; }
    .metric .value { font-weight: 600; font-size: 0.95rem; }
    
    /* [SEÇÃO 6] Destaque P/VP */
    .metric.pvp-discount .value { color: var(--success); }
    .metric.pvp-premium .value { color: var(--danger); }
    
    /* [SEÇÃO 7] Links */
    .links { display: flex; gap: 8px; flex-wrap: wrap; }
    .link { flex: 1; padding: 6px; text-align: center; border-radius: 6px; text-decoration: none; font-size: 0.8rem; font-weight: 500; border: 1px solid var(--border); color: var(--text); background: var(--bg); }
    .link:hover { background: var(--border); }
    
    /* [SEÇÃO 8] Status e Skeleton */
    .status { text-align: center; color: var(--muted); padding: 40px 20px; }
    .skeleton { background: var(--border); height: 20px; border-radius: 4px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .note { font-size: 0.7rem; color: var(--muted); margin-top: 6px; line-height: 1.4; }
    #fundamentals-badge { margin-top: 6px; color: var(--success); font-weight: 600; display: none; }
    
    /* [SEÇÃO 9] Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
    .modal.active { display: flex; }
    .modal-content { background: var(--card); border-radius: 12px; padding: 24px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-header h2 { font-size: 1.25rem; }
    .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--muted); padding: 0; width: 30px; height: 30px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
    .login-form { display: flex; flex-direction: column; gap: 12px; }
    .login-form input { padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 0.9rem; }
    .user-info { display: flex; gap: 8px; align-items: center; font-size: 0.875rem; }
    
    /* [SEÇÃO 10] Formulário de Edição */
    .edit-header {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr 1fr;
      gap: 8px;
      padding: 8px 12px;
      font-weight: 600;
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 4px;
    }
    .edit-row {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr 1fr;
      gap: 8px;
      padding: 10px 12px;
      align-items: center;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .edit-row:hover { background: var(--bg); }
    .edit-row .ticker-label { font-weight: 700; font-size: 0.95rem; color: var(--text); }
    .edit-row input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 500;
      text-align: center;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .edit-row input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }
    .edit-row input::placeholder { color: var(--muted); opacity: 0.6; }
    
    /* [SEÇÃO 11] Responsivo */
    @media (max-width: 480px) { 
      header { flex-direction: column; align-items: flex-start; } 
      .grid { grid-template-columns: 1fr; }
      .edit-header, .edit-row {
        grid-template-columns: 1fr 1fr 1fr 1fr;
        gap: 4px;
        padding: 8px 6px;
      }
      .edit-row .ticker-label { font-size: 0.8rem; }
      .edit-row input { padding: 6px 4px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Sparta Fund Monitor</h1>
      <div class="meta">Monitoramento de fundos geridos pela Sparta Asset Management</div>
      <div id="fundamentals-badge">📅 Fundamentos atualizados em: <span id="fund-date-text">...</span></div>
    </div>
    <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
      <span id="last-update" class="meta">Aguardando...</span>
      <button id="refresh-btn">Atualizar</button>
      <div id="auth-area">
        <button id="login-btn" class="secondary">Login</button>
      </div>
    </div>
  </header>

  <main id="grid" class="grid"></main>

  <!-- Modal de Login -->
  <div id="login-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Login de Administrador</h2>
        <button class="close-btn" onclick="closeLoginModal()">&times;</button>
      </div>
      <div class="login-form">
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-password" placeholder="Senha">
        <div id="login-error" style="color: var(--danger); font-size: 0.875rem; display: none;"></div>
        <button id="login-submit">Entrar</button>
      </div>
    </div>
  </div>

  <!-- Modal de Edição de Fundamentos -->
  <div id="edit-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Editar Fundamentos</h2>
        <button class="close-btn" onclick="closeEditModal()">&times;</button>
      </div>
      <form id="edit-form"></form>
      <div id="edit-status" style="font-size: 0.875rem; margin-top: 10px; text-align: center;"></div>
      <div class="modal-actions">
        <button type="button" class="secondary" onclick="closeEditModal()">Cancelar</button>
        <button type="button" id="save-btn" onclick="saveFundamentals()">Salvar</button>
      </div>
    </div>
  </div>

  <script>
    /* [SEÇÃO 12] Firebase Configuration */
    const firebaseConfig = {
      apiKey: "AIzaSyCUGI3NzVQ6VOe0AtImR9XHLscDC_kPLes",
      authDomain: "sparta-fund-monitor.firebaseapp.com",
      projectId: "sparta-fund-monitor",
      storageBucket: "sparta-fund-monitor.firebasestorage.app",
      messagingSenderId: "81992335341",
      appId: "1:81992335341:web:affa10dda248cec15c31e4"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    /* [SEÇÃO 13] Configurações do App */
    const API_KEY = '7EpuGco9ML58FkFmZVyBWY';
    const FUNDS = ['JURO11', 'DIVS11', 'CRAA11', 'CDII11', 'MXRF11'];
    const BASE_URL = 'https://brapi.dev/api/quote';
    
    // URLs oficiais dos fundos
    const FUND_LINKS = {
      'JURO11': { site: 'https://www.sparta.com.br/sparta-fi-infra/', nome: 'Sparta RI' },
      'DIVS11': { site: 'https://www.sparta.com.br/divs11/', nome: 'Sparta RI' },
      'CRAA11': { site: 'https://www.sparta.com.br/craa11/', nome: 'Sparta RI' },
      'CDII11': { site: 'https://www.sparta.com.br/sparta-cdii11/', nome: 'Sparta RI' },
      'MXRF11': { site: 'https://www.xpasset.com.br/fundos/maxi-renda/', nome: 'XP Asset' }
    };
    
    /* [SEÇÃO 14] Dados Fundamentais (Fallback) */
    let FUNDAMENTALS = {
      "JURO11": { "vp": 101.32, "pffo": 8.5, "dy": 11.69, "updated": "2026-06-19" },
      "DIVS11": { "vp": 9.50, "pffo": 10.2, "dy": 13.00, "updated": "2026-06-19" },
      "CRAA11": { "vp": 8.90, "pffo": 9.7, "dy": 14.95, "updated": "2026-06-19" },
      "CDII11": { "vp": 9.20, "pffo": 9.9, "dy": 17.09, "updated": "2026-06-19" },
      "MXRF11": { "vp": 10.36, "pffo": 11.5, "dy": 12.50, "updated": "2026-06-19" }
    };

    /* [SEÇÃO 15] Elementos do DOM */
    const grid = document.getElementById('grid');
    const refreshBtn = document.getElementById('refresh-btn');
    const lastUpdateEl = document.getElementById('last-update');
    const cacheKey = 'sparta_price_cache';
    const cacheTimeKey = 'sparta_price_ts';
    const CACHE_TIME = 60 * 60 * 1000;

    /* [SEÇÃO 16] Firebase - Carregar Fundamentos */
    function loadFundamentalsFromFirestore() {
      return new Promise((resolve) => {
        db.collection('fundamentals').get().then(snapshot => {
          if (snapshot.empty) {
            console.log('📭 Nenhum dado no Firestore, usando fallback');
            resolve(false);
            return;
          }
          
          const newData = {};
          snapshot.forEach(doc => {
            newData[doc.id] = doc.data();
          });
          
          FUNDAMENTALS = newData;
          console.log('✅ Fundamentos carregados do Firestore:', FUNDAMENTALS);
          resolve(true);
        }).catch(err => {
          console.error('❌ Erro ao carregar do Firestore:', err);
          resolve(false);
        });
      });
    }

    /* [SEÇÃO 17] Firebase - Salvar Fundamentos */
    async function saveFundamentals() {
      const saveBtn = document.getElementById('save-btn');
      const statusEl = document.getElementById('edit-status');
      
      saveBtn.disabled = true;
      saveBtn.textContent = 'Salvando...';
      statusEl.textContent = '';
      statusEl.style.color = '';
      
      try {
        const batch = db.batch();
        
        FUNDS.forEach(ticker => {
          const vpElement = document.getElementById(`vp-${ticker}`);
          const pffoElement = document.getElementById(`pffo-${ticker}`);
          const dyElement = document.getElementById(`dy-${ticker}`);
          
          const vp = vpElement ? parseFloat(vpElement.value) : null;
          const pffo = pffoElement ? parseFloat(pffoElement.value) : null;
          const dy = dyElement ? parseFloat(dyElement.value) : null;
          
          const docRef = db.collection('fundamentals').doc(ticker);
          batch.set(docRef, {
            vp: isNaN(vp) ? null : vp,
            pffo: isNaN(pffo) ? null : pffo,
            dy: isNaN(dy) ? null : dy,
            updated: new Date().toISOString().split('T')[0],
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          });
        });
        
        await batch.commit();
        
        statusEl.textContent = '✅ Dados salvos com sucesso!';
        statusEl.style.color = 'var(--success)';
        
        await loadFundamentalsFromFirestore();
        showFundamentalsDate();
        renderData(currentPrices);
        
        setTimeout(() => {
          closeEditModal();
        }, 1500);
        
      } catch (err) {
        console.error('❌ Erro ao salvar:', err);
        statusEl.textContent = '❌ Erro ao salvar: ' + err.message;
        statusEl.style.color = 'var(--danger)';
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Salvar';
      }
    }

    /* [SEÇÃO 18] Autenticação */
    function setupAuthListener() {
      auth.onAuthStateChanged(user => {
        const authArea = document.getElementById('auth-area');
        if (user) {
          authArea.innerHTML = `
            <div class="user-info">
              <button id="edit-btn">Editar Fundamentos</button>
              <button id="logout-btn" class="danger">Sair</button>
            </div>
          `;
          document.getElementById('edit-btn').addEventListener('click', showEditModal);
          document.getElementById('logout-btn').addEventListener('click', () => auth.signOut());
        } else {
          authArea.innerHTML = `<button id="login-btn" class="secondary">Login</button>`;
          document.getElementById('login-btn').addEventListener('click', openLoginModal);
        }
      });
    }

    function openLoginModal() {
      document.getElementById('login-modal').classList.add('active');
      document.getElementById('login-error').style.display = 'none';
    }

    function closeLoginModal() {
      document.getElementById('login-modal').classList.remove('active');
      document.getElementById('login-email').value = '';
      document.getElementById('login-password').value = '';
    }

    async function handleLogin() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');
      
      try {
        await auth.signInWithEmailAndPassword(email, password);
        closeLoginModal();
      } catch (err) {
        errorEl.textContent = '❌ ' + err.message;
        errorEl.style.display = 'block';
      }
    }

    /* [SEÇÃO 19] Modal de Edição */
    function showEditModal() {
      const form = document.getElementById('edit-form');
      
      const header = `
        <div class="edit-header">
          <div>Ticker</div>
          <div>Cota Patrimonial (R$)</div>
          <div>P/FFO</div>
          <div>DY %</div>
        </div>
      `;
      
      const rows = FUNDS.map(ticker => {
        const fund = FUNDAMENTALS[ticker] || {};
        return `
          <div class="edit-row">
            <div class="ticker-label">${ticker}</div>
            <input type="number" step="0.01" id="vp-${ticker}" placeholder="0.00" value="${fund.vp !== undefined && fund.vp !== null ? fund.vp : ''}">
            <input type="number" step="0.01" id="pffo-${ticker}" placeholder="0.00" value="${fund.pffo !== undefined && fund.pffo !== null ? fund.pffo : ''}">
            <input type="number" step="0.01" id="dy-${ticker}" placeholder="0.00" value="${fund.dy !== undefined && fund.dy !== null ? fund.dy : ''}">
          </div>
        `;
      }).join('');
      
      form.innerHTML = header + rows;
      document.getElementById('edit-modal').classList.add('active');
      document.getElementById('edit-status').textContent = '';
    }

    function closeEditModal() {
      document.getElementById('edit-modal').classList.remove('active');
    }

    /* [SEÇÃO 20] Funções Auxiliares */
    function formatNumber(val, decimals = 2, suffix = '') {
      if (val === null || val === undefined || isNaN(val)) return '-';
      return Number(val).toFixed(decimals) + suffix;
    }

    /* [SEÇÃO 21] Criar Card - COM MELHORIAS */
    function createCard(priceData) {
      const { symbol, regularMarketPrice } = priceData;
      const fund = FUNDAMENTALS[symbol] || {};
      
      // Links: Google Finance + Site oficial do fundo
      const googleUrl = `https://www.google.com/finance/quote/${symbol}:BVMF`;
      const fundLink = FUND_LINKS[symbol] || { site: googleUrl, nome: 'Google Finance' };
      
      // Calcular P/VP automaticamente
      const pvp = (fund.vp && regularMarketPrice) 
        ? (regularMarketPrice / fund.vp) 
        : null;
      
      // Determinar classe CSS para P/VP
      let pvpClass = '';
      if (pvp !== null && pvp !== undefined) {
        if (pvp < 1) pvpClass = 'pvp-discount';
        else if (pvp > 1) pvpClass = 'pvp-premium';
      }

      return `
        <div class="card">
          <div class="ticker">${symbol}</div>
          <div class="name">Fundo Sparta Asset Management</div>
          <div class="metrics">
            <div class="metric">
              <span class="label">Preço</span>
              <span class="value">R$ ${formatNumber(regularMarketPrice)}</span>
            </div>
            <div class="metric ${pvpClass}">
              <span class="label">P/VP</span>
              <span class="value">${formatNumber(pvp)}</span>
            </div>
            <div class="metric">
              <span class="label">P/FFO</span>
              <span class="value">${formatNumber(fund.pffo)}</span>
            </div>
            <div class="metric">
              <span class="label">DY</span>
              <span class="value">${formatNumber(fund.dy, 2)}%</span>
            </div>
            <div class="metric" style="grid-column: span 2;">
              <span class="label">Cota Patrimonial</span>
              <span class="value">R$ ${fund.vp ? formatNumber(fund.vp) : '-'}</span>
            </div>
          </div>
          <div class="links">
            <a href="${googleUrl}" target="_blank" class="link">Google Finance</a>
            <a href="${fundLink.site}" target="_blank" class="link">${fundLink.nome}</a>
          </div>
          <div class="note">📊 Indicadores: ${fund.updated ? 'Atualizado em ' + fund.updated.split('-').reverse().join('/') : 'Consulte o informe mensal'}. P/FFO é o padrão institucional para FIIs.</div>
        </div>
      `;
    }

    /* [SEÇÃO 22] Skeleton Loading */
    function renderSkeleton() {
      grid.innerHTML = Array(FUNDS.length).fill('').map(() => `
        <div class="card">
          <div class="skeleton" style="width: 60%; height: 24px; margin-bottom: 8px;"></div>
          <div class="skeleton" style="width: 40%; height: 16px; margin-bottom: 16px;"></div>
          <div class="metrics">
            ${Array(5).fill('').map(() => `<div class="metric"><div class="skeleton" style="height: 14px;"></div></div>`).join('')}
          </div>
        </div>
      `).join('');
    }

    /* [SEÇÃO 23] Buscar Preços */
    async function fetchPrices() {
      const now = Date.now();
      const cached = localStorage.getItem(cacheKey);
      const cachedTs = localStorage.getItem(cacheTimeKey);

      if (cached && cachedTs && (now - Number(cachedTs) < CACHE_TIME)) {
        return JSON.parse(cached);
      }

      try {
        const requests = FUNDS.map(ticker => 
          fetch(`${BASE_URL}/${ticker}?token=${API_KEY}`).then(r => r.json())
        );
        const results = await Promise.all(requests);
        const prices = results
          .filter(r => r.results?.length)
          .map(r => ({ symbol: r.results[0].symbol, regularMarketPrice: r.results[0].regularMarketPrice }));
        
        localStorage.setItem(cacheKey, JSON.stringify(prices));
        localStorage.setItem(cacheTimeKey, String(now));
        return prices;
      } catch (err) {
        console.error('Erro ao buscar preços:', err);
        return [];
      }
    }

    let currentPrices = [];

    /* [SEÇÃO 24] Fetch Data - COM ORDENAÇÃO POR P/VP */
    async function fetchData(force = false) {
      if (force) localStorage.removeItem(cacheKey);
      
      refreshBtn.disabled = true;
      refreshBtn.textContent = 'Atualizando...';
      renderSkeleton();

      const prices = await fetchPrices();
      currentPrices = FUNDS.map(ticker => {
        const price = prices.find(p => p.symbol === ticker);
        return price ? { ...price } : { symbol: ticker, regularMarketPrice: null };
      });

      // Ordenar por P/VP (menor para maior)
      currentPrices.sort((a, b) => {
        const pvpA = FUNDAMENTALS[a.symbol]?.pvp || 999;
        const pvpB = FUNDAMENTALS[b.symbol]?.pvp || 999;
        return pvpA - pvpB;
      });

      renderData(currentPrices);
      const lastFundUpdate = Object.values(FUNDAMENTALS)[0]?.updated || 'n/a';
      lastUpdateEl.textContent = `Preço: ${new Date().toLocaleTimeString('pt-BR')} | Fund: ${lastFundUpdate}`;
      
      refreshBtn.disabled = false;
      refreshBtn.textContent = 'Atualizar';
    }

    /* [SEÇÃO 25] Render Data */
    function renderData(data) {
      grid.innerHTML = data.map(createCard).join('');
    }

    /* [SEÇÃO 26] Mostrar Data dos Fundamentos */
    function showFundamentalsDate() {
      const firstFund = Object.values(FUNDAMENTALS)[0];
      if (firstFund && firstFund.updated) {
        const [year, month, day] = firstFund.updated.split('-');
        document.getElementById('fund-date-text').textContent = `${day}/${month}/${year}`;
        document.getElementById('fundamentals-badge').style.display = 'inline-block';
      }
    }

    /* [SEÇÃO 27] Inicialização */
    refreshBtn.addEventListener('click', () => fetchData(true));
    document.getElementById('login-submit').addEventListener('click', handleLogin);
    
    setupAuthListener();
    
    loadFundamentalsFromFirestore().then(() => {
      showFundamentalsDate();
      fetchData();
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sparta-fund-monitor/sw.js', {
          updateViaCache: 'none'
        })
          .then(reg => {
            console.log('✅ SW registrado');
            setInterval(() => {
              reg.update();
            }, 60 * 60 * 1000);
          })
          .catch(err => console.log('❌ SW falhou:', err));
      });
    }
  </script>
